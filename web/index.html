<!DOCTYPE html>
<html lang="tr">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="SourceBase — kaynaklarını öğrenme sistemine dönüştür. Medasi ekosistemi premium öğrenme deneyimi.">
  <meta name="theme-color" content="#066BFF">

  <!-- iOS / PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SourceBase">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SourceBase</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #05070D; }
    #sb-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background:
        radial-gradient(120% 80% at 20% 10%, rgba(0,205,226,0.22), transparent 60%),
        radial-gradient(120% 80% at 90% 90%, rgba(142,62,249,0.22), transparent 60%),
        #070A12;
      transition: opacity .45s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #sb-splash.sb-hide { opacity: 0; pointer-events: none; }
    .sb-mark {
      width: 92px; height: 92px; border-radius: 26px;
      background: linear-gradient(135deg, #00CDE2 0%, #066BFF 52%, #8E3EF9 100%);
      box-shadow: 0 18px 48px rgba(6,107,255,0.45), 0 0 0 1px rgba(255,255,255,0.18) inset;
      display: flex; align-items: center; justify-content: center;
      animation: sb-pulse 1.6s ease-in-out infinite;
    }
    .sb-mark svg { width: 44px; height: 44px; }
    .sb-title { margin-top: 26px; color: #EAF1FF; font-size: 26px; font-weight: 800; letter-spacing: .3px; }
    .sb-sub { margin-top: 8px; color: #8C9AB8; font-size: 13px; }
    .sb-dots { margin-top: 22px; display: flex; gap: 7px; }
    .sb-dots i { width: 8px; height: 8px; border-radius: 50%; background: #2E8BFF; display: block; animation: sb-bounce 1.2s ease-in-out infinite; }
    .sb-dots i:nth-child(2) { animation-delay: .18s; }
    .sb-dots i:nth-child(3) { animation-delay: .36s; }
    @keyframes sb-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes sb-bounce { 0%,100% { opacity:.35; transform: scale(.7);} 50% { opacity:1; transform: scale(1);} }
  </style>
</head>
<body>
  <div id="sb-splash">
    <div class="sb-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 4.5h9A2.5 2.5 0 0 1 17.5 7v12.5L13 16.8l-4.5 2.7V7" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="rgba(255,255,255,0.12)"/>
        <path d="M9 8.5h5M9 11.5h5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sb-title">SourceBase</div>
    <div class="sb-sub">Premium öğrenme deneyimi hazırlanıyor…</div>
    <div class="sb-dots"><i></i><i></i><i></i></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('sb-splash');
      if (!s) return;
      s.classList.add('sb-hide');
      setTimeout(function () { s.remove(); }, 500);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
