server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for client-side routes / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed Flutter assets; never cache the entry HTML.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|wasm|json)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
